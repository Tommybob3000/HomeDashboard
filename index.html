<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Home Dashboard</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 🔥 CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyClW1ZAVPlriZueY2EnnXrxHDtnRC8ncqQ",
            authDomain: "homedashboard-7dfdd.firebaseapp.com",
            projectId: "homedashboard-7dfdd",
            storageBucket: "homedashboard-7dfdd.firebasestorage.app",
            messagingSenderId: "727327411095",
            appId: "1:727327411095:web:6d48362347a2a5d67292d2",
            databaseURL: "https://homedashboard-7dfdd-default-rtdb.europe-west1.firebasedatabase.app"
        };

        let db;
        let currentData = {};
        let isEditMode = false;

        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            
            db.ref('weeklyMenu').on('value', (snapshot) => {
                currentData = snapshot.val() || {};
                renderMenu();
            }, (error) => {
                document.getElementById('weekly-menu-container').innerHTML = `<div style="color:#ef4444; background:#fee2e2; padding:15px; border-radius:8px;">⚠️ Data Error</div>`;
            });
        } catch (e) {
            console.error(e);
        }

        function renderMenu() {
            const container = document.getElementById('weekly-menu-container');
            if (!container) return;
            container.innerHTML = '';
            
            const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
            const todayIndex = new Date().getDay() - 1;
            const currentDayName = todayIndex === -1 ? 'Sunday' : days[todayIndex];

            days.forEach((day) => {
                const key = day.toLowerCase();
                const items = Array.isArray(currentData[key]) ? currentData[key] : [];
                const isToday = (day === currentDayName);
                
                const card = document.createElement('div');
                card.className = `day-card ${isToday ? 'day-card-today' : ''}`;

                let itemsHtml = '';
                if (items.length === 0) {
                    itemsHtml = `<div class="empty-state">No plans yet</div>`;
                } else {
                    items.forEach((item, idx) => {
                        const delBtn = isEditMode ? `<button class="delete-btn" onclick="deleteItem('$${key}', $${idx})">×</button>` : '';
                        itemsHtml += `<div class="menu-item">$${delBtn}<span class="item-text">$${item}</span></div>`;
                    });
                }

                const addBtn = isEditMode ? `<button class="add-btn" onclick="addItemPrompt('${key}')">+</button>` : '';
                const todayBadge = isToday ? `<span class="today-badge">● Today</span>` : '';

                card.innerHTML = `
                    <div class="day-header">
                        <div class="day-title-group">
                            <h3>${day}</h3>
                            ${todayBadge}
                        </div>
                        ${addBtn}
                    </div>
                    <div class="day-items">${itemsHtml}</div>
                `;
                container.appendChild(card);
            });
        }

        function toggleEdit() {
            if (!db) { alert("Database disconnected"); return; }
            if (!isEditMode) {
                const pin = prompt("Enter PIN");
                if (pin === "1234") {
                    isEditMode = true;
                    document.getElementById('edit-btn').classList.add('active');
                    document.getElementById('edit-btn').textContent = "Done";
                    renderMenu();
                } else if (pin !== null) { alert("Incorrect PIN"); }
            } else {
                isEditMode = false;
                document.getElementById('edit-btn').classList.remove('active');
                document.getElementById('edit-btn').textContent = "Edit";
                renderMenu();
            }
        }

        window.addItemPrompt = function(key) {
            const item = prompt(`Add item for ${key}:`);
            if (!item) return;
            db.ref('weeklyMenu/' + key).once('value', s => {
                let list = s.val() || [];
                if (!Array.isArray(list)) list = [];
                list.push(item);
                db.ref('weeklyMenu/' + key).set(list);
            });
        };

        window.deleteItem = function(key, idx) {
            if (!confirm("Remove this item?")) return;
            db.ref('weeklyMenu/' + key).once('value', s => {
                let list = s.val() || [];
                if (!Array.isArray(list)) return;
                list.splice(idx, 1);
                db.ref('weeklyMenu/' + key).set(list);
            });
        };

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('edit-btn').addEventListener('click', toggleEdit);
            setTimeout(renderMenu, 500);
        });
    </script>
